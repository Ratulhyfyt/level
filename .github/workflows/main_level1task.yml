name: Build and deploy Node.js app to Azure Web App - level1task

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci --legacy-peer-deps
      - name: Prepare deploy artifact
        run: |
          mkdir -p deploy
          rsync -a \
            --exclude=".git*" \
            --exclude=".github" \
            --exclude=".vscode" \
            --exclude="node_modules" \
            --exclude="test" \
            --exclude="tests" \
            --exclude="coverage" \
            ./ deploy/
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: deploy/

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: node-app
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_4A3B293D24E34D3AAC861E98F7BC17EB }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_17600925ECEC48F38304823BF361EEA5 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_D3C54FD689D74BE3B27B919B439F15C4 }}
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: level1task
          slot-name: Production
          package: .
